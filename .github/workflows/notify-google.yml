name: Notify Google after deploy

on:
  push:
    branches:
      - staging
      - master

jobs:
  ping-google:
    name: Ping Google sitemap
    runs-on: ubuntu-latest
    # Only runs after the branch push — Netlify deploy happens separately.
    # We wait a bit for Netlify to finish before pinging Google.
    steps:
      - name: Wait for Netlify deploy
        run: sleep 60

      - name: Submit sitemap to Google
        run: |
          SITEMAP_URL="https://topclanker.com/sitemap.xml"
          echo "Pinging Google with sitemap: $SITEMAP_URL"
          curl -s "https://www.google.com/ping?sitemap=${SITEMAP_URL}" \
            -w "\nHTTP status: %{http_code}\n" \
            -o /dev/null
          echo "Done"

      - name: Ping Bing
        run: |
          SITEMAP_URL="https://topclanker.com/sitemap.xml"
          curl -s "https://www.bing.com/ping?sitemap=${SITEMAP_URL}" \
            -w "\nHTTP status: %{http_code}\n" \
            -o /dev/null
          echo "Bing pinged"
