[build]
  command = ""
  publish = "public"

# Serve blog posts directly (don't redirect to SPA)
[[redirects]]
  from = "/blog/*.html"
  to = "/blog/:splat"
  status = 200
  force = true

# Redirect rules (optional but good for SEO) - must be AFTER blog rules
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
